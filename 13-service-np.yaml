apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  labels:
    purpose: Service-nodeport-demo
spec:
  type: NodePort
  selector:
    purpose: config
    env: dev
    project: roboshop
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx-nodeport
  labels:
    purpose: Service-nodeport-demo
    env: dev
    project: roboshop
spec:
  containers:
  - name: nginx
    image: nginx